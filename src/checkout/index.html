<!doctype html>

<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Sleep Outside | Checkout</title>

  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/checkout.js" type="module"></script>
</head>

<body>
  <header class="divider" id="main-header"></header>

  <main class="divider">
    <section class="checkout-section">
      <h2>Review & Place your Order</h2>
      
      <form id="checkout-form" name="checkoutForm">
        <fieldset>
          <legend>Shipping & Billing</legend>
          <label>First Name: <input type="text" name="fname" required /></label>
          <label>Last Name: <input type="text" name="lname" required /></label>
          <label>Street Address: <input type="text" name="street" required /></label>
          <label>City: <input type="text" name="city" required /></label>
          <label>State: <input type="text" name="state" required /></label>
          <label>Zip Code: <input type="text" name="zip" id="zip-code" required /></label>
        </fieldset>

        <fieldset>
          <legend>Payment</legend>
          <label>Card Number: <input type="text" name="cardNumber" value="1234123412341234" required /></label>
          <label>Expiration: <input type="text" name="expiration" placeholder="MM/YY" required /></label>
          <label>Security Code: <input type="text" name="code" value="123" required /></label>
        </fieldset>

        <div id="order-summary">
          <h3>Order Summary</h3>
          <p>Item Subtotal: <span id="cartTotal"></span></p>
          <p>Shipping Estimate: <span id="shipping"></span></p>
          <p>Tax: <span id="tax"></span></p>
          <p><strong>Order Total: <span id="orderTotal"></span></strong></p>
        </div>

        <button type="submit" id="checkoutSubmit">Place Order</button>
      </form>
    </section>
  </main>

  <footer id="main-footer"></footer>
</body>

</html>
